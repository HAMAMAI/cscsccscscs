name: Deploy audio calls server

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: takt-calls-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure pinned SSH host
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 15 -t ed25519 "$VPS_HOST" > ~/.ssh/known_hosts.new 2>/dev/null
          actual="$(ssh-keygen -E sha256 -lf ~/.ssh/known_hosts.new | awk '{print $2}')"
          test "$actual" = "SHA256:eVbIlyRG84yEOuUIdcH27ooQT+okpN+tWpLcSchhjas"
          mv ~/.ssh/known_hosts.new ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          CALL_DOMAIN: ${{ secrets.CALL_DOMAIN }}
          TURN_DOMAIN: ${{ secrets.TURN_DOMAIN }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' \
            "CALL_DOMAIN=$CALL_DOMAIN" \
            "TURN_DOMAIN=$TURN_DOMAIN" \
            "LIVEKIT_API_KEY=$LIVEKIT_API_KEY" \
            "LIVEKIT_API_SECRET=$LIVEKIT_API_SECRET" \
            "LIVEKIT_NODE_IP=$VPS_HOST" \
            "SUPABASE_URL=https://qewgunjxdpliyeazyjkn.supabase.co" \
            "SUPABASE_PUBLISHABLE_KEY=sb_publishable_oFE1KGP-BLnRJT_IaJ30Bg_eaFyPaf2" > /tmp/takt-livekit.env
          ssh "$VPS_USER@$VPS_HOST" 'install -d -m 700 /opt/takt/livekit'
          tar -czf - -C infra/livekit . | ssh "$VPS_USER@$VPS_HOST" 'tar -xzf - -C /opt/takt/livekit'
          scp /tmp/takt-livekit.env "$VPS_USER@$VPS_HOST:/opt/takt/livekit/.env"

      - name: Publish verified Android APK
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          expected_sha="f9d8b88c11a4664f39be23b1e3132bbf86c915fd16de86e5e73e4ff5eaea2027"
          curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 \
            --output /tmp/takt-android.apk \
            "https://github.com/HAMAMAI/cscsccscscs/releases/download/v2.0.0-beta.3/takt-android.apk"
          echo "$expected_sha  /tmp/takt-android.apk" | sha256sum --check
          test "$(stat --format=%s /tmp/takt-android.apk)" -eq 68980963
          zip --junk-paths --quiet /tmp/takt-android.zip /tmp/takt-android.apk
          unzip -t /tmp/takt-android.zip
          ssh "$VPS_USER@$VPS_HOST" 'install -d -m 755 /opt/takt/downloads'
          scp /tmp/takt-android.apk "$VPS_USER@$VPS_HOST:/opt/takt/downloads/takt-android.apk.upload"
          scp /tmp/takt-android.zip "$VPS_USER@$VPS_HOST:/opt/takt/downloads/takt-android.zip.upload"
          ssh "$VPS_USER@$VPS_HOST" \
            'mv /opt/takt/downloads/takt-android.apk.upload /opt/takt/downloads/takt-android.apk && mv /opt/takt/downloads/takt-android.zip.upload /opt/takt/downloads/takt-android.zip && chmod 644 /opt/takt/downloads/takt-android.apk /opt/takt/downloads/takt-android.zip'

      - name: Install and start LiveKit with TURN
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" 'chmod 700 /opt/takt/livekit/*.sh && cd /opt/takt/livekit && ./bootstrap-vps.sh'

      - name: Container diagnostics
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" 'cd /opt/takt/livekit && docker compose ps --all && docker compose logs --tail=120 token-service livekit caddy'

      - name: Verify public endpoints
        env:
          CALL_DOMAIN: ${{ secrets.CALL_DOMAIN }}
          TURN_DOMAIN: ${{ secrets.TURN_DOMAIN }}
        run: |
          set -euo pipefail
          curl --fail --retry 10 --retry-all-errors --retry-delay 3 "https://$CALL_DOMAIN/health" | grep -q '"ok":true'
          curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 \
            --output /tmp/takt-android.apk "https://$CALL_DOMAIN/downloads/takt-android.apk"
          echo "f9d8b88c11a4664f39be23b1e3132bbf86c915fd16de86e5e73e4ff5eaea2027  /tmp/takt-android.apk" \
            | sha256sum --check
          test "$(stat --format=%s /tmp/takt-android.apk)" -eq 68980963
          curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 \
            --output /tmp/takt-android.zip "https://$CALL_DOMAIN/downloads/takt-android.zip"
          unzip -p /tmp/takt-android.zip takt-android.apk | sha256sum --check --status <(printf '%s  -\n' 'f9d8b88c11a4664f39be23b1e3132bbf86c915fd16de86e5e73e4ff5eaea2027')
          timeout 15 openssl s_client -connect "$TURN_DOMAIN:5349" -servername "$TURN_DOMAIN" </dev/null 2>/dev/null \
            | openssl x509 -noout -checkend 86400

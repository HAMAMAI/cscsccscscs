name: Deploy audio calls server

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: takt-calls-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure pinned SSH host
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 15 -t ed25519 "$VPS_HOST" > ~/.ssh/known_hosts.new 2>/dev/null
          actual="$(ssh-keygen -E sha256 -lf ~/.ssh/known_hosts.new | awk '{print $2}')"
          test "$actual" = "SHA256:eVbIlyRG84yEOuUIdcH27ooQT+okpN+tWpLcSchhjas"
          mv ~/.ssh/known_hosts.new ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          CALL_DOMAIN: ${{ secrets.CALL_DOMAIN }}
          TURN_DOMAIN: ${{ secrets.TURN_DOMAIN }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' \
            "CALL_DOMAIN=$CALL_DOMAIN" \
            "TURN_DOMAIN=$TURN_DOMAIN" \
            "LIVEKIT_API_KEY=$LIVEKIT_API_KEY" \
            "LIVEKIT_API_SECRET=$LIVEKIT_API_SECRET" \
            "LIVEKIT_NODE_IP=$VPS_HOST" > /tmp/takt-livekit.env
          ssh "$VPS_USER@$VPS_HOST" 'install -d -m 700 /opt/takt/livekit'
          tar -czf - -C infra/livekit . | ssh "$VPS_USER@$VPS_HOST" 'tar -xzf - -C /opt/takt/livekit'
          scp /tmp/takt-livekit.env "$VPS_USER@$VPS_HOST:/opt/takt/livekit/.env"

      - name: Install and start LiveKit with TURN
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" 'chmod 700 /opt/takt/livekit/*.sh && cd /opt/takt/livekit && ./bootstrap-vps.sh'

      - name: Verify public endpoints
        env:
          CALL_DOMAIN: ${{ secrets.CALL_DOMAIN }}
          TURN_DOMAIN: ${{ secrets.TURN_DOMAIN }}
        run: |
          set -euo pipefail
          curl --fail --retry 10 --retry-all-errors --retry-delay 3 "https://$CALL_DOMAIN" >/dev/null
          timeout 15 openssl s_client -connect "$TURN_DOMAIN:443" -servername "$TURN_DOMAIN" </dev/null 2>/dev/null \
            | openssl x509 -noout -checkend 86400

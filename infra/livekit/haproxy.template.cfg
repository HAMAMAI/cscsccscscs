global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  timeout connect 10s
  timeout client 1h
  timeout server 1h

frontend tls_gateway
  bind *:443
  tcp-request inspect-delay 5s
  tcp-request content accept if { req.ssl_hello_type 1 }
  use_backend turn_tls if { req.ssl_sni -i ${TURN_DOMAIN} }
  default_backend livekit_signal_tls

backend turn_tls
  server turn 127.0.0.1:5349 check

backend livekit_signal_tls
  server caddy 127.0.0.1:8443 check

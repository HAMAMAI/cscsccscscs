port: 7880
bind_addresses:
  - 127.0.0.1

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  enable_loopback_candidate: false

turn:
  enabled: true
  domain: ${TURN_DOMAIN}
  tls_port: 5349
  udp_port: 443
  cert_file: /certs/live/${TURN_DOMAIN}/fullchain.pem
  key_file: /certs/live/${TURN_DOMAIN}/privkey.pem

keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  level: info

services:
  token-service:
    build:
      context: ./token-service
    container_name: takt-call-token
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "7890"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_WS_URL: wss://${CALL_DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7890/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.13.4
    container_name: takt-livekit
    restart: unless-stopped
    network_mode: host
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./generated/livekit.yaml:/etc/livekit.yaml:ro
      - /etc/letsencrypt:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7880/"]
      interval: 20s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.10.2-alpine
    container_name: takt-call-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./generated/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt:/certs:ro
      - /opt/takt/downloads:/srv/downloads:ro
    depends_on:
      livekit:
        condition: service_started
      token-service:
        condition: service_started
